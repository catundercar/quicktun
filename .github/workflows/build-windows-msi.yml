name: Build Windows MSI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # required to attach assets to GitHub Releases

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Build quicktun-agent.exe
        shell: pwsh
        run: |
          $env:CGO_ENABLED = "0"
          go build -o quicktun-agent.exe -ldflags "-s -w" .\cmd\quicktun-agent

      - name: Setup WiX 5
        shell: pwsh
        run: |
          dotnet tool install --global wix
          # Add the dotnet tools dir to PATH for subsequent steps
          "$env:USERPROFILE\.dotnet\tools" | Out-File -Append $env:GITHUB_PATH

      - name: Build MSI
        shell: pwsh
        run: |
          $exePath   = (Resolve-Path quicktun-agent.exe).Path
          $yamlPath  = (Resolve-Path deploy\windows\agent.yaml.example).Path
          wix build deploy\windows\wix\Product.wxs `
              -define AgentExePath="$exePath" `
              -define AgentYamlExamplePath="$yamlPath" `
              -out quicktun-agent.msi

      - name: Upload MSI as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: quicktun-agent-msi
          path: quicktun-agent.msi
          retention-days: 30

      - name: Attach MSI to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: quicktun-agent.msi
