# quicktun-stream.conf — stream{} block for the auth-proxy front door.
#
# nginx's `stream` directive must live at the TOP LEVEL of nginx config,
# NOT inside http{}. Two install options:
#
#   A. Append the contents of this file (without the surrounding `stream {}`
#      wrapping if your distro doesn't use streams-enabled) to
#      /etc/nginx/nginx.conf at the top level.
#
#   B. Put it in /etc/nginx/streams-available/quicktun-stream.conf and
#      symlink into /etc/nginx/streams-enabled/ if your nginx package wires
#      `include /etc/nginx/streams-enabled/*.conf;` from a top-level
#      `stream {}` block in nginx.conf.
#
# Replace RELAY_DOMAIN before reloading. Run certbot first:
#   certbot certonly --nginx -d RELAY_DOMAIN
#
# Verify nginx was built --with-stream:
#   nginx -V 2>&1 | tr ' ' '\n' | grep -- --with-stream

stream {
    upstream quicktun_authproxy {
        server 127.0.0.1:8443;
    }

    server {
        listen 443 ssl;
        # Note: stream's `server_name` only matters when SNI multiplexing.
        # If RELAY_DOMAIN is the only TLS terminator on :443 in stream{},
        # this directive is informational.
        server_name RELAY_DOMAIN;

        ssl_certificate     /etc/letsencrypt/live/RELAY_DOMAIN/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/RELAY_DOMAIN/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        proxy_pass quicktun_authproxy;
        proxy_protocol off;
    }
}
