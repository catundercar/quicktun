# quicktun-http.conf — http{} server blocks for the control plane.
#
# Install path: /etc/nginx/sites-available/quicktun-http.conf, then
#   ln -s ../sites-available/quicktun-http.conf /etc/nginx/sites-enabled/
#
# Replace CONTROL_DOMAIN before reloading. Run certbot first so the cert
# files referenced below exist:
#   certbot certonly --nginx -d CONTROL_DOMAIN -d api.CONTROL_DOMAIN
#
# Then: nginx -t && systemctl reload nginx

# ---- gRPC control plane (HTTP/2 + TLS on :443 for CONTROL_DOMAIN) ----
server {
    listen 443 ssl http2;
    server_name CONTROL_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/CONTROL_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/CONTROL_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        grpc_pass grpc://127.0.0.1:9090;
        # Pass-through gRPC headers; nginx 1.13.10+ required.
        grpc_set_header Host $host;
    }
}

# ---- HTTP gateway (REST -> gRPC) for human / curl operators ----
server {
    listen 443 ssl;
    server_name api.CONTROL_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/CONTROL_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/CONTROL_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://127.0.0.1:9091;
        proxy_set_header Host            $host;
        proxy_set_header X-Forwarded-For $remote_addr;
    }
}
