// ServiceAccountService — admin-only management of long-lived bearer
// tokens scoped to a specific operator. Designed for CI/CD automation
// where the login-derived session TTL is impractical.
//
// Tokens are shown to the admin once at create time (in the
// ServiceAccountTokenWithRaw.raw field) and never recoverable; the server
// stores only a SHA-256 hash. Revoke marks the token as invalidated; the
// auth interceptor rejects revoked tokens immediately on next use.
syntax = "proto3";

package quicktun.v1;

import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/tulip/quicktun/gen/go/quicktun/v1;quicktunv1";

// ServiceAccountService manages SA tokens. Admin-only.
service ServiceAccountService {
  // CreateServiceAccountToken issues a fresh SA token for the given
  // operator. The returned ServiceAccountTokenWithRaw.raw field is the
  // ONLY chance to capture the token value; subsequent reads return only
  // metadata.
  rpc CreateServiceAccountToken(CreateServiceAccountTokenRequest) returns (ServiceAccountTokenWithRaw) {
    option (google.api.http) = {
      post: "/v1/{operator=operators/*}/serviceAccountTokens"
      body: "*"
    };
  }

  // ListServiceAccountTokens returns metadata for every SA token bound
  // to the given operator (including revoked ones, so admins can audit).
  rpc ListServiceAccountTokens(ListServiceAccountTokensRequest) returns (ListServiceAccountTokensResponse) {
    option (google.api.http) = {
      get: "/v1/{operator=operators/*}/serviceAccountTokens"
    };
  }

  // RevokeServiceAccountToken marks the SA token revoked. Idempotent.
  rpc RevokeServiceAccountToken(RevokeServiceAccountTokenRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/v1/serviceAccountTokens/{id}:revoke"
      body: "*"
    };
  }
}

// ServiceAccountToken is the metadata view of an SA token. The raw secret
// is never present — see ServiceAccountTokenWithRaw for the create response.
message ServiceAccountToken {
  uint64 id = 1;
  // Operator resource name. Format: operators/{id}.
  string operator = 2;
  string description = 3;
  google.protobuf.Timestamp create_time = 4;
  // Optional. Empty when the token has no expiry.
  google.protobuf.Timestamp expire_time = 5;
  // Optional. Empty when the token has not been used yet.
  google.protobuf.Timestamp last_used_time = 6;
  // Optional. Empty when the token is still active.
  google.protobuf.Timestamp revoke_time = 7;
}

// ServiceAccountTokenWithRaw is the response to CreateServiceAccountToken.
// The raw value is shown exactly once.
message ServiceAccountTokenWithRaw {
  ServiceAccountToken token = 1;
  // The raw bearer token. Carries the qt_sat_ prefix for visibility.
  string raw = 2;
}

message CreateServiceAccountTokenRequest {
  // Owning operator. Format: operators/{id}.
  string operator = 1 [(google.api.field_behavior) = REQUIRED];
  string description = 2;
  // Token TTL in seconds. 0 = no expiry.
  int64 ttl_seconds = 3;
}

message ListServiceAccountTokensRequest {
  string operator = 1 [(google.api.field_behavior) = REQUIRED];
}

message ListServiceAccountTokensResponse {
  repeated ServiceAccountToken tokens = 1;
}

message RevokeServiceAccountTokenRequest {
  uint64 id = 1 [(google.api.field_behavior) = REQUIRED];
}
